<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kesar God Mode</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif;scroll-behavior:smooth;}

body{
background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover fixed;
color:#fff;
overflow-x:hidden;
}

/* DARK OVERLAY */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:rgba(0,20,0,0.75);
z-index:-3;
}

/* RAIN */
.rain{position:fixed;width:100%;height:100%;z-index:-2;}
.drop{
position:absolute;
bottom:100%;
width:2px;
height:80px;
background:linear-gradient(transparent,cyan);
filter:drop-shadow(0 0 6px cyan);
animation:fall linear infinite;
}
@keyframes fall{to{transform:translateY(120vh);}}

/* FOG */
.fog{
position:fixed;
width:200%;
height:100%;
background:url("https://i.ibb.co/2k4YQZ9/fog.png");
opacity:0.2;
animation:fogmove 60s linear infinite;
z-index:-1;
}
@keyframes fogmove{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* THUNDER */
.flash{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
z-index:5;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

/* HERO */
.hero{
display:flex;
align-items:center;
justify-content:space-between;
padding:80px 60px;
min-height:100vh;
animation:fadeIn 2s ease;
}

.hero img{
width:280px;
border-radius:50%;
border:4px solid cyan;
box-shadow:0 0 25px cyan;
}

/* GLASS SECTIONS */
section{
margin:40px;
padding:70px 60px;
border-radius:20px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
animation:fadeUp 1.5s ease;
}

/* BOX HOVER ENERGY */
.box{
padding:25px 40px;
border-radius:12px;
font-weight:bold;
transition:0.4s;
}
.box:hover{
transform:translateY(-15px) scale(1.08);
box-shadow:0 0 20px cyan;
}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>

<body>

<div class="rain"></div>
<div class="fog"></div>
<div class="flash" id="flash"></div>

<nav>
<h2>⚡ Kesar</h2>
<ul><li>About</li><li>Skills</li><li>Contact</li></ul>
</nav>

<div class="hero">
<div>
<h1>Hello, I'm <br>Kesar Sooryavanshi</h1>
<p>Tech • Creator • Visionary</p>
</div>
<img src="kesar01.jpeg">
</div>

<section>
<h2>About Me</h2>
<p>Passionate BTech student building next-gen digital experiences.</p>
</section>

<section>
<h2>My Skills</h2>
<div class="box">Problem Solving</div>
</section>

<script>

/* RAIN */
const rain = document.querySelector('.rain');
for(let i=0;i<160;i++){
let drop = document.createElement("div");
drop.classList.add("drop");
drop.style.left=Math.random()*100+"vw";
drop.style.animationDuration=0.5+Math.random()+"s";
rain.appendChild(drop);
}

/* THUNDER */
function thunder(){
let flash=document.getElementById("flash");
flash.style.opacity="0.8";
setTimeout(()=>flash.style.opacity="0",100);
}
setInterval(thunder,4000+Math.random()*5000);

</script>

</body>
</html>
