<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kesar GOD MODE</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:black;color:white;overflow-x:hidden}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
z-index:999;
animation:fadeOut 3s forwards 2s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}

/* PARALLAX BACKGROUND */
.bg{
position:fixed;
width:110%;
height:110%;
background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover;
z-index:-3;
}

/* RAIN CANVAS */
canvas{position:fixed;top:0;left:0;z-index:-2}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

h1{
font-size:65px;
text-shadow:0 0 20px cyan;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px cyan}
to{text-shadow:0 0 30px magenta}
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(15px);
box-shadow:0 0 25px rgba(0,255,255,0.3);
transition:0.5s;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 0 35px cyan;
}

/* CURSOR TRAIL */
.trail{
position:fixed;
width:10px;
height:10px;
background:cyan;
border-radius:50%;
pointer-events:none;
mix-blend-mode:screen;
animation:fade 1s linear forwards;
}
@keyframes fade{to{opacity:0;transform:scale(0)}}

</style>
</head>

<body>

<div id="loader">INITIALIZING GOD MODE...</div>
<div class="bg"></div>

<canvas id="rain"></canvas>

<div class="hero">
<h1>Kesar Sooryavanshi</h1>
<div class="card">⚡ Welcome to My Digital Universe</div>
</div>

<script>

/* RAIN */
const canvas=document.getElementById("rain");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let rain=[];
for(let i=0;i<200;i++){
rain.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
l:Math.random()*20,
s:Math.random()*5+5
});
}

function drawRain(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.strokeStyle="cyan";
ctx.lineWidth=1;
ctx.beginPath();
rain.forEach(r=>{
ctx.moveTo(r.x,r.y);
ctx.lineTo(r.x,r.y+r.l);
});
ctx.stroke();

rain.forEach(r=>{
r.y+=r.s;
if(r.y>canvas.height) r.y=0;
});
requestAnimationFrame(drawRain);
}
drawRain();

/* CURSOR ENERGY */
document.addEventListener("mousemove",e=>{
let t=document.createElement("div");
t.className="trail";
t.style.left=e.pageX+"px";
t.style.top=e.pageY+"px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),1000);
});

/* THUNDER */
setInterval(()=>{
document.body.style.background="white";
setTimeout(()=>document.body.style.background="black",100);
},6000);

</script>

</body>
</html>
